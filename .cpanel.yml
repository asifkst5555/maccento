---
deployment:
  tasks:
    - export APPPATH=/home/cotp5210/repositories/maccento
    - export PUBLICPATH=/home/cotp5210/public_html
    - /bin/mkdir -p "$PUBLICPATH/assets"
    - /usr/bin/rsync -a --delete "$APPPATH/public/assets/" "$PUBLICPATH/assets/"
    - /usr/bin/rsync -a "$APPPATH/public/.htaccess" "$PUBLICPATH/.htaccess"
    - /usr/bin/rsync -a "$APPPATH/public/index.php" "$PUBLICPATH/index.php"
    - /bin/sed -i "s#require __DIR__.'/../vendor/autoload.php';#require '/home/cotp5210/repositories/maccento/vendor/autoload.php';#g" "$PUBLICPATH/index.php"
    - /bin/sed -i "s#\$app = require_once __DIR__.'/../bootstrap/app.php';#\$app = require_once '/home/cotp5210/repositories/maccento/bootstrap/app.php';#g" "$PUBLICPATH/index.php"
    - cd "$APPPATH"
    - /usr/local/bin/ea-php83 /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader --no-interaction || composer install --no-dev --optimize-autoloader --no-interaction
    - /usr/local/bin/ea-php83 artisan migrate --force || php artisan migrate --force
    - /usr/local/bin/ea-php83 artisan optimize:clear || php artisan optimize:clear
    - /usr/local/bin/ea-php83 artisan optimize || php artisan optimize
    - export DEPLOY_COMMIT=$(/usr/bin/git -C "$APPPATH" rev-parse --short HEAD || echo unknown)
    - export DEPLOY_TIME=$(/bin/date -u +"%Y-%m-%dT%H:%M:%SZ")
    - /bin/printf '{"app":"maccento","commit":"%s","deployed_at_utc":"%s"}\n' "$DEPLOY_COMMIT" "$DEPLOY_TIME" > "$PUBLICPATH/deploy.json"
